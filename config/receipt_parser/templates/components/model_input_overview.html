<script>
const fileInput = document.getElementById("fileInput");
const uploadButton = document.getElementById("uploadButton");
const fileName = document.getElementById("fileName");
const addReceiptForm = document.getElementById("addReceiptForm");

uploadButton.addEventListener("click", () => {
    fileInput.click();
});

fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileName.textContent = "/media/receipt_parser/" + fileInput.files[0].name;
        addReceiptForm.submit();
    } else {
        fileName.textContent = "{{ image_path.url }}";
    }
});
</script>

<script>
function getRandomVisibleColor() {
    // Generate random RGB values
    const r = Math.floor(Math.random() * 256);
    const g = Math.floor(Math.random() * 256);
    const b = Math.floor(Math.random() * 256);

    // Calculate luminance (perceived brightness)
    const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

    // Minimum luminance for good contrast (4.5:1 WCAG ratio)
    const minLuminance = 44.625;

    // If luminance is too low, try again
    if (luminance < minLuminance) {
        return getRandomVisibleColor();
    }

    // Convert RGB to hex
    const toHex = (c) => {
        let hex = c.toString(16);
        return hex.length === 1 ? "0" + hex : hex;
    };

    return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

function startStream() {
    const evtSource = new EventSource("/stream/");
    console.log("Starting Stream")

    let output = "";

    evtSource.onmessage = function(event) {
        console.log(event.data)
        output += event.data;

        document.getElementById("stream-container").innerText = output;
        document.getElementById("LoadingIndicator").style.color = getRandomVisibleColor();

    };

    evtSource.onerror = function() {
        document.getElementById("LoadingIndicator").innerText = "";
        console.log("Error streaming")
        evtSource.close();
    };
}
</script>
