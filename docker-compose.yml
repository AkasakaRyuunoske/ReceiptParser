version: "3.9"

services:
  django:
    build: .
    expose:
      - "8000"
    volumes:
      - static_volume:/config/staticfiles

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro

volumes:
  static_volume: